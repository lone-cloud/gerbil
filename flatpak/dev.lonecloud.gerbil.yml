app-id: dev.lonecloud.gerbil
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: gerbil
separate-locales: false

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=all
  - --filesystem=host
  - --talk-name=org.freedesktop.Flatpak
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=org.freedesktop.StatusNotifierWatcher

modules:
  - name: uv
    buildsystem: simple
    build-commands:
      - tar -xzf uv-x86_64-unknown-linux-gnu.tar.gz
      - install -Dm755 uv-x86_64-unknown-linux-gnu/uv /app/bin/uv
      - install -Dm755 uv-x86_64-unknown-linux-gnu/uvx /app/bin/uvx
      - find uv-x86_64-unknown-linux-gnu -name 'LICENSE*' -exec install -Dm644 {} /app/share/licenses/dev.lonecloud.gerbil/uv/ \;
    sources:
      - type: file
        url: https://github.com/astral-sh/uv/releases/download/0.11.9/uv-x86_64-unknown-linux-gnu.tar.gz
        sha256: 5c43f82077ff0cd5aec588286cbabd89913e4d045bd4e8aa60b20b3ecffc36e3

  - name: gerbil
    buildsystem: simple
    build-commands:
      - chmod +x Gerbil-*.AppImage
      - ./Gerbil-*.AppImage --appimage-extract
      - mkdir -p /app/lib/gerbil
      - cp -r squashfs-root/. /app/lib/gerbil/
      - install -Dm755 gerbil-wrapper.sh /app/bin/gerbil
      - install -Dm644 dev.lonecloud.gerbil.desktop /app/share/applications/dev.lonecloud.gerbil.desktop
      - install -Dm644 dev.lonecloud.gerbil.metainfo.xml /app/share/metainfo/dev.lonecloud.gerbil.metainfo.xml
      - install -Dm644 squashfs-root/usr/share/icons/hicolor/512x512/apps/gerbil.png /app/share/icons/hicolor/512x512/apps/dev.lonecloud.gerbil.png
      - install -Dm644 LICENSE /app/share/licenses/dev.lonecloud.gerbil/gerbil/LICENSE
      - install -Dm644 squashfs-root/LICENSE.electron.txt /app/share/licenses/dev.lonecloud.gerbil/gerbil/LICENSE.electron.txt
      - install -Dm644 squashfs-root/LICENSES.chromium.html /app/share/licenses/dev.lonecloud.gerbil/gerbil/LICENSES.chromium.html
    sources:
      - type: file
        url: https://github.com/lone-cloud/gerbil/releases/download/v1.24.0/Gerbil-1.24.0.AppImage
        sha256: 8a2f797c09c28b524e50041571bf35c1cdb4a0a4f5a597c075173ad0f231a077
      - type: script
        dest-filename: gerbil-wrapper.sh
        commands:
          - export PATH="/opt/rocm/bin:/app/bin:/run/host/usr/bin:/run/host/usr/local/bin:$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
          - export LD_LIBRARY_PATH="/opt/rocm/lib:/opt/rocm/lib64:${LD_LIBRARY_PATH}"
          - export VK_DRIVER_FILES="/run/host/usr/share/vulkan/icd.d:/run/host/etc/vulkan/icd.d"
          - exec zypak-wrapper /app/lib/gerbil/gerbil "$@"
      - type: file
        path: dev.lonecloud.gerbil.desktop
      - type: file
        path: dev.lonecloud.gerbil.metainfo.xml
      - type: file
        url: https://raw.githubusercontent.com/lone-cloud/gerbil/v1.24.0/LICENSE
        sha256: 0d96a4ff68ad6d4b6f1f30f713b18d5184912ba8dd389f86aa7710db079abcb0
